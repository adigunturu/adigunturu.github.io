<!DOCTYPE html><html lang="en"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><link rel="stylesheet" href="./_next/static/css/94fc6fe2152fa09c.css" data-precedence="next"/><meta name="robots" content="noindex"/><title>404: This page could not be found.</title><title>Aditya Gunturu</title><meta name="description" content="Aditya Gunturu is an incoming CS PhD student at the University of Washington working on intelligent interfaces, mixed reality, and authoring tools."/><link rel="icon" href="./icon.png" type="image/png"/><link rel="apple-touch-icon" href="./icon.png" type="image/png"/></head><body class="antialiased"><main class=""><div style="font-family:system-ui,&quot;Segoe UI&quot;,Roboto,Helvetica,Arial,sans-serif,&quot;Apple Color Emoji&quot;,&quot;Segoe UI Emoji&quot;;height:100vh;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center"><div><style>body{color:#000;background:#fff;margin:0}.next-error-h1{border-right:1px solid rgba(0,0,0,.3)}@media (prefers-color-scheme:dark){body{color:#fff;background:#000}.next-error-h1{border-right:1px solid rgba(255,255,255,.3)}}</style><h1 class="next-error-h1" style="display:inline-block;margin:0 20px 0 0;padding:0 23px 0 0;font-size:24px;font-weight:500;vertical-align:top;line-height:49px">404</h1><div style="display:inline-block"><h2 style="font-size:14px;font-weight:400;line-height:49px;margin:0">This page could not be found.</h2></div></div></div></main><footer class="border-t border-neutral-200 dark:border-neutral-800 bg-[#FFFCF8]"><div class="flex flex-row mx-auto max-w-7xl px-6 py-5 md:flex md:items-start md:justify-between "><div class="mb-0 text-sm text-neutral-600 dark:text-neutral-400"><p>© <!-- -->2026<!-- --> <!-- -->Aditya Gunturu<!-- -->.</p></div><div class="mb-0"><p class="text-sm text-neutral-500 dark:text-neutral-500 justify">Built with<!-- --> <a href="https://github.com/tovacinni/research-website-template" class="underline hover:text-neutral-800 dark:hover:text-neutral-300 transition-colors" target="_blank" rel="noopener noreferrer">research-website-template</a></p></div></div></footer><script>
(() => {
  const email = "adityagt@cs.washington.edu";

  const writeClipboard = async (text) => {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return;
    }

    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.top = "-1000px";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    document.execCommand("copy");
    textarea.remove();
  };

  const copyButton = document.querySelector('button[aria-label^="Copy "]');
  if (copyButton) {
    const label = copyButton.querySelector("span");
    const originalLabel = label ? label.textContent : email;
    const originalAria = copyButton.getAttribute("aria-label") || "Copy " + email + " to clipboard";
    let resetTimer;

    copyButton.addEventListener("click", async () => {
      try {
        await writeClipboard(email);
        copyButton.setAttribute("aria-label", "Copied email");
        if (label) label.textContent = "Copied";
        window.clearTimeout(resetTimer);
        resetTimer = window.setTimeout(() => {
          copyButton.setAttribute("aria-label", originalAria);
          if (label) label.textContent = originalLabel;
        }, 1800);
      } catch {
        copyButton.setAttribute("aria-label", originalAria);
      }
    });
  }

  document.querySelectorAll(".news-scroll-shell").forEach((shell) => {
    const scroll = shell.querySelector(".news-scroll");
    if (!scroll || shell.querySelector(".news-scroll-track")) return;

    const track = document.createElement("div");
    const thumb = document.createElement("div");
    track.className = "news-scroll-track";
    thumb.className = "news-scroll-thumb";
    track.appendChild(thumb);
    shell.appendChild(track);

    const updateThumb = () => {
      const range = scroll.scrollHeight - scroll.clientHeight;
      const trackHeight = scroll.clientHeight;
      const thumbHeight = range > 0
        ? Math.max(28, Math.round((scroll.clientHeight / scroll.scrollHeight) * trackHeight))
        : trackHeight;
      const travel = Math.max(0, trackHeight - thumbHeight);
      const top = range > 0 ? (scroll.scrollTop / range) * travel : 0;

      track.style.height = trackHeight + "px";
      thumb.style.height = thumbHeight + "px";
      thumb.style.transform = "translateY(" + top + "px)";
    };

    let dragging = false;
    let startY = 0;
    let startScrollTop = 0;

    const pointerY = (event) => event.touches ? event.touches[0].clientY : event.clientY;

    const onMove = (event) => {
      if (!dragging) return;
      event.preventDefault();
      const range = scroll.scrollHeight - scroll.clientHeight;
      const thumbHeight = thumb.offsetHeight || 1;
      const travel = Math.max(1, scroll.clientHeight - thumbHeight);
      const delta = pointerY(event) - startY;
      scroll.scrollTop = startScrollTop + (delta / travel) * range;
    };

    const onUp = () => {
      dragging = false;
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.removeEventListener("touchmove", onMove);
      document.removeEventListener("touchend", onUp);
    };

    thumb.addEventListener("mousedown", (event) => {
      dragging = true;
      startY = pointerY(event);
      startScrollTop = scroll.scrollTop;
      document.addEventListener("mousemove", onMove, { passive: false });
      document.addEventListener("mouseup", onUp);
    });

    thumb.addEventListener("touchstart", (event) => {
      dragging = true;
      startY = pointerY(event);
      startScrollTop = scroll.scrollTop;
      document.addEventListener("touchmove", onMove, { passive: false });
      document.addEventListener("touchend", onUp);
    }, { passive: true });

    track.addEventListener("mousedown", (event) => {
      if (event.target === thumb) return;
      const rect = track.getBoundingClientRect();
      const range = scroll.scrollHeight - scroll.clientHeight;
      const thumbHeight = thumb.offsetHeight || 1;
      const nextTop = event.clientY - rect.top - thumbHeight / 2;
      const travel = Math.max(1, scroll.clientHeight - thumbHeight);
      scroll.scrollTop = (nextTop / travel) * range;
    });

    scroll.addEventListener("scroll", updateThumb);
    window.addEventListener("resize", updateThumb);
    updateThumb();
  });
})();
</script></body></html>
